<!DOCTYPE html>
<html lang="ca">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vectors - Web de Achraf</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

  <style>
    body {
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- CONTENIDO -->
<div class="container mt-4">
  <h1>Vectors</h1>
  <p>Aquí trobem la informació sobre vectors</p>

  <!-- Botón tema (si lo usas en navbar o aquí) -->
  <button id="themeToggle" class="btn btn-secondary">
    <i class="fa-solid fa-moon"></i>
  </button>
</div>

<!-- SCRIPT NAVBAR -->
<script>
async function loadNavbar() {

  const response = await fetch("https://aziani01.github.io/navbar.html");
  const data = await response.text();

  document.getElementById("navbar").innerHTML = data;

  // dropdowns
  window.toggleDropdown = function(id) {

    const el = document.getElementById(id);

    document.querySelectorAll('[id^="dd"]').forEach(d => {
      if (d.id !== id) d.classList.add('hidden');
    });

    el.classList.toggle('hidden');
  };

  // cerrar dropdown al clicar fuera
  document.addEventListener("click", (e) => {

    if (!e.target.closest(".relative")) {

      document.querySelectorAll('[id^="dd"]').forEach(d => {
        d.classList.add('hidden');
      });

    }

  });

  // menú móvil
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  if (menuBtn && mobileMenu) {
    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("hidden");
    });
  }
}

loadNavbar();
</script>

<!-- THEME TOGGLE -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const themeToggle = document.getElementById('themeToggle');

  if (!themeToggle) return;

  const themeIcon = themeToggle.querySelector('i');

  themeToggle.addEventListener('click', () => {

    if (document.body.getAttribute('data-bs-theme') === 'dark') {

      document.body.setAttribute('data-bs-theme', 'light');

      themeIcon.classList.remove('fa-sun');
      themeIcon.classList.add('fa-moon');

    } else {

      document.body.setAttribute('data-bs-theme', 'dark');

      themeIcon.classList.remove('fa-moon');
      themeIcon.classList.add('fa-sun');

    }

  });

});
</script>

</body>
</html>
