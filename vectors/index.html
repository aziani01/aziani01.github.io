<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web de Achraf</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
    }

    /* Dropdown modo oscuro */
    body[data-bs-theme="dark"] .dropdown-menu {
      background-color: #2c2c2c !important;
      border-color: #444;
    }

    body[data-bs-theme="dark"] .dropdown-item {
      color: #f8f9fa !important;
    }

    body[data-bs-theme="dark"] .dropdown-item:hover {
      background-color: #3c3c3c !important;
    }

    /* Botón tema */
    #themeToggle {
      border: none;
      background: transparent;
      font-size: 1.3rem;
      color: inherit;
    }

    /* Logo bien controlado */
    .logo {
      width: 40px;
      height: 40px;
      object-fit: cover;
    }

    @media (min-width: 992px) {
      .logo {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>

<body data-bs-theme="light">

<!-- NAVBAR DINÁMICA -->
<div id="navbar"></div>

<!-- CONTENIDO -->
<div class="container mt-4">
  <p>Aquí trobem la informació sobre vectors</p>
</div>

<!-- SCRIPTS -->
<script>
async function loadNavbar() {
  const response = await fetch("navbar.html"); 
  const data = await response.text();

  document.getElementById("navbar").innerHTML = data;

  // Theme toggle (solo si existe)
  const themeToggle = document.getElementById("themeToggle");

  if (themeToggle) {
    const icon = themeToggle.querySelector("i");

    themeToggle.addEventListener("click", () => {
      const dark = document.body.getAttribute("data-bs-theme") === "dark";

      document.body.setAttribute("data-bs-theme", dark ? "light" : "dark");

      if (icon) {
        icon.classList.toggle("fa-sun");
        icon.classList.toggle("fa-moon");
      }
    });
  }

  // Dropdowns
  window.toggleDropdown = function(id) {
    const el = document.getElementById(id);

    document.querySelectorAll('[id^="dd"]').forEach(d => {
      if (d.id !== id) d.classList.add("d-none");
    });

    el.classList.toggle("d-none");
  };

  // Cerrar al clicar fuera
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".relative")) {
      document.querySelectorAll('[id^="dd"]').forEach(d => {
        d.classList.add("d-none");
      });
    }
  });

  // Menú móvil
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  if (menuBtn && mobileMenu) {
    menuBtn.addEventListener("click", () => {
      mobileMenu.classList.toggle("d-none");
    });
  }
}

loadNavbar();
</script>

<!-- Bootstrap JS (IMPORTANTE) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
